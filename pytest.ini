[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Display settings
addopts = 
    --verbose
    --color=yes
    --durations=10
    --showlocals
    --tb=auto

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning
    ignore::ResourceWarning

# Coverage settings
# Uncomment to enable coverage reporting
# addopts = 
#     --cov=src
#     --cov-report=term
#     --cov-report=html

# Markers
markers =
    unit: Unit tests that test a single component in isolation
    integration: Tests that verify multiple components working together
    slow: Tests that take a long time to run
    data: Tests that require specific data files
    performance: Tests that measure performance metrics 